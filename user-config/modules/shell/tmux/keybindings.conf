## NOTE:
# Some of the keybindings are used by Alacritty keybindings, allowing easier
# access to the shortcuts.

# Set prefix key to C-t instead of default C-b. C-t is easy to reach and,
# unlike C-b/C-a, doesn't collide with readline navigation. The double-tap
# (C-t C-t) is repurposed below to open a new window, so `send-prefix`
# (for nested tmux / passing a literal C-t through) lives on F1 instead.
#
# C-q is kept as a secondary prefix (tmux's `prefix2`) so existing muscle
# memory / Alacritty key chords that emit C-q keep working while C-t becomes
# the primary. `C-q C-q` sends a literal C-q to the inner app (needed e.g.
# for readline's quoted-insert), since C-q isn't claimed by the new-window
# binding.
unbind C-b
set -g prefix C-t
set -g prefix2 C-q
bind-key C-q send-prefix -2
bind-key -T root F1 send-prefix

# New window ("tab"): both C-t C-t and C-t t open one in the current pane's
# directory. Replaces tmux's default `c`, which ignores the cwd.
bind-key C-t new-window -c '#{pane_current_path}'
bind-key t   new-window -c '#{pane_current_path}'

# Toogle last window by hitting again C-f
bind-key C-f last-window

# Split horiziontal and vertical splits, instead of % and ". It would open them
# in the same directory.
# For vertical split, it would open with 100 line width, for horizontal, 30
# column height.
bind-key v split-window -h -l 100 -c '#{pane_current_path}'
bind-key s split-window -v -l 30 -c '#{pane_current_path}'

# Pressing Ctrl+Shift+Left will move the current window to the left. Similarly
# right. No need to use the modifier (C-b and the like).
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Source file
unbind r
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Reloaded!"

# Sync panes (Send input to all panes in the window). When enabled, pane
# borders become red as an indication.
bind C-p if -F '#{pane_synchronized}' \
    'setw synchronize-panes off; \
    setw pane-active-border-style fg=colour63,bg=default; \
    setw pane-border-format       "#[bg=default,fg=colour232]#[bg=colour232,fg=default] #{=/-20/…:pane_title} [#{=/-20/…:pane_current_command}] #(pgrep -P \"#{pane_pid}\" | tr \"\n\" \" \")#{pane_current_path} #{?alternate_on,<Alt Mode> ,}#[bg=default,fg=default]#[bg=default,fg=colour232]"' \
    'setw synchronize-panes on; \
    setw pane-active-border-style fg=red; \
    setw pane-border-format       "#[bg=default,fg=colour70]#[bg=colour70,fg=default] #{=/-20/…:pane_title} [#{=/-20/…:pane_current_command}] #(pgrep -P \"#{pane_pid}\" | tr \"\n\" \" \")#{pane_current_path} #{?alternate_on,<Alt Mode> ,}#[bg=default,fg=default]#[bg=default,fg=colour70]"'

# Equally resize all panes
bind-key = select-layout even-horizontal
bind-key | select-layout even-vertical

# Resize panes
bind-key J resize-pane -D 10
bind-key K resize-pane -U 10
bind-key H resize-pane -L 10
bind-key L resize-pane -R 10

# Select panes
# NOTE(arslan): See to prevent cycling https://github.com/tmux/tmux/issues/1158
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R

# Kill pane without confirmation
bind-key x kill-pane

# Adjust window title -- moved off `t` (now "new window") onto `,`, which is
# tmux's own default for rename-window anyway.
bind-key , command-prompt -I "#W" "rename-window '%%'"

# Select the final window
bind-key 9 select-window -t :$

# Window switching with Meta (Alt) + number (no prefix needed)
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9
